```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>National Steel | Precision Engineering Suite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/controls/OrbitControls.js"></script>

<style>

:root{
--brand-blue:#0052cc;
--bg-dark:#0a0e14;
--panel-bg:#161b22;
--border-color:#30363d;
--text-main:#e6edf3;
--accent-green:#238636;
}

body{
margin:0;
font-family:'Inter',sans-serif;
background:var(--bg-dark);
color:var(--text-main);
}

header{
padding:40px 20px;
background:linear-gradient(135deg,#0b2f55 0%,#051937 100%);
border-bottom:1px solid var(--border-color);
text-align:center;
}

header h1{
margin:0;
font-size:1.8rem;
text-transform:uppercase;
}

nav{
background:#0d1117;
position:sticky;
top:0;
border-bottom:1px solid var(--border-color);
}

.nav-wrap{
display:flex;
gap:8px;
padding:12px;
overflow-x:auto;
max-width:1100px;
margin:auto;
}

.nav-wrap button{
padding:8px 20px;
background:transparent;
border:1px solid var(--border-color);
color:#8b949e;
border-radius:4px;
cursor:pointer;
font-weight:600;
font-size:.85rem;
}

.nav-wrap button.active{
background:var(--brand-blue);
color:white;
border-color:var(--brand-blue);
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.tool{
display:none;
background:var(--panel-bg);
padding:35px;
border-radius:8px;
border:1px solid var(--border-color);
}

.tool.active{display:block;}

h2{
margin-top:0;
font-size:1.4rem;
border-left:4px solid var(--brand-blue);
padding-left:15px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
}

.input-group label{
display:block;
font-size:.75rem;
color:#8b949e;
margin-bottom:6px;
text-transform:uppercase;
font-weight:600;
}

input,select{
padding:12px;
border-radius:4px;
border:1px solid var(--border-color);
background:#0d1117;
color:white;
width:100%;
font-family:'IBM Plex Mono',monospace;
}

.calc{
margin-top:30px;
padding:14px 28px;
background:var(--accent-green);
border:none;
border-radius:4px;
color:white;
cursor:pointer;
font-weight:700;
width:100%;
}

.result{
margin-top:25px;
background:#0d1117;
padding:20px;
border-radius:4px;
border-left:4px solid var(--brand-blue);
}

.result-val{
font-family:'IBM Plex Mono',monospace;
font-size:1.2rem;
color:#58a6ff;
}

.viewer{
width:100%;
height:320px;
margin-top:20px;
border:1px solid #2b313a;
border-radius:6px;
background:black;
}

</style>
</head>

<body>

<header>
<h1>Precision Metal Weight Estimator</h1>
</header>

<nav>
<div class="nav-wrap">

<button class="active" data-tool="chain">Chainlink</button>
<button data-tool="perf">Perforated</button>

</div>
</nav>

<div class="container">

<section id="chain" class="tool active">

<h2>Chainlink Mesh</h2>

<div class="grid">

<div class="input-group">
<label>Wire Dia (mm)</label>
<input id="cl_d">
</div>

<div class="input-group">
<label>Mesh Size (mm)</label>
<input id="cl_m">
</div>

<div class="input-group">
<label>Width (m)</label>
<input id="cl_w">
</div>

<div class="input-group">
<label>Length (m)</label>
<input id="cl_l">
</div>

</div>

<button class="calc" onclick="calcChain()">Calculate Weight</button>

<div id="cl_r" class="result"></div>

<div id="viewer" class="viewer"></div>

</section>


<section id="perf" class="tool">

<h2>Perforated Sheet</h2>

<div class="grid">

<div class="input-group">
<label>Hole Dia (mm)</label>
<input id="pf_hole">
</div>

<div class="input-group">
<label>Pitch (mm)</label>
<input id="pf_pitch">
</div>

</div>

<button class="calc" onclick="calcPerf()">Calculate Open Area</button>

<div id="pf_r" class="result"></div>

<div id="viewer" class="viewer"></div>

</section>

</div>

<script>

/* NAVIGATION */

document.querySelectorAll(".nav-wrap button").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".tool").forEach(t=>t.classList.remove("active"))
document.querySelectorAll(".nav-wrap button").forEach(b=>b.classList.remove("active"))

document.getElementById(btn.dataset.tool).classList.add("active")
btn.classList.add("active")
}
})

/* 3D ENGINE */

let scene,camera,renderer,controls,meshObj

function init3D(){

const container=document.querySelector(".tool.active .viewer")

scene=new THREE.Scene()

camera=new THREE.PerspectiveCamera(
45,
container.clientWidth/container.clientHeight,
0.1,
1000
)

camera.position.set(3,3,5)

renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(container.clientWidth,container.clientHeight)

container.innerHTML=""
container.appendChild(renderer.domElement)

controls=new THREE.OrbitControls(camera,renderer.domElement)

const light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,7)
scene.add(light)

const amb=new THREE.AmbientLight(0x404040)
scene.add(amb)

animate()

}

function animate(){
requestAnimationFrame(animate)
controls.update()
renderer.render(scene,camera)
}

/* CHAINLINK 3D */

function createChainlink3D(pitch,wire,width,length){

const material=new THREE.MeshStandardMaterial({color:0xb0b0b0})

const group=new THREE.Group()

for(let x=-width;x<width;x+=pitch){

const geo=new THREE.CylinderGeometry(wire/2,wire/2,length,8)
const m=new THREE.Mesh(geo,material)

m.rotation.z=Math.PI/4
m.position.x=x

group.add(m)

}

for(let x=-width;x<width;x+=pitch){

const geo=new THREE.CylinderGeometry(wire/2,wire/2,length,8)
const m=new THREE.Mesh(geo,material)

m.rotation.z=-Math.PI/4
m.position.x=x

group.add(m)

}

scene.add(group)
meshObj=group

}

/* PERFORATED 3D */

function createPerforated3D(hole,pitch){

const material=new THREE.MeshStandardMaterial({color:0xcccccc})

const plateGeo=new THREE.BoxGeometry(5,0.1,5)

const plate=new THREE.Mesh(plateGeo,material)

const group=new THREE.Group()

group.add(plate)

const holeGeo=new THREE.CylinderGeometry(hole/2,hole/2,0.2,16)

for(let x=-2.5;x<2.5;x+=pitch){

for(let y=-2.5;y<2.5;y+=pitch){

const holeMesh=new THREE.Mesh(holeGeo,new THREE.MeshBasicMaterial({color:0x000000}))
holeMesh.rotation.x=Math.PI/2
holeMesh.position.set(x,0,y)

group.add(holeMesh)

}

}

scene.add(group)
meshObj=group

}

/* CALCULATORS */

function calcChain(){

const d=cl_d.value/1000
const m=cl_m.value/1000
const w=+cl_w.value
const l=+cl_l.value

if(!d||!m||!w||!l)return

const volume=(Math.PI*(d*d)/4)*(w*l/m)*1.38
const weight=volume*7850

cl_r.innerHTML="Weight: <span class='result-val'>"+weight.toFixed(3)+" kg</span>"

init3D()
createChainlink3D(m,d,w,l)

}

function calcPerf(){

const h=+pf_hole.value
const p=+pf_pitch.value

const open=(h*h*90.69)/(p*p)

pf_r.innerHTML="Open Area: <span class='result-val'>"+open.toFixed(2)+" %</span>"

init3D()
createPerforated3D(h/1000,p/1000)

}

</script>

</body>
</html>
