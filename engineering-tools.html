<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Engineering Tools | National Steel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

:root{
--navy:#051326;
--navy2:#0b2f55;
--accent:#3b82ff;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.15);
--text:#e8eef6;
--muted:#9fb0c5;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:
radial-gradient(circle at 20% 0%,#0e3a73,transparent 50%),
linear-gradient(140deg,#02101f,#051a33);
color:var(--text);
}

/* HEADER */

header{
padding:70px 20px;
border-bottom:1px solid var(--border);
background:linear-gradient(120deg,var(--navy),var(--navy2));
}

header h1{
font-family:"IBM Plex Sans";
font-size:34px;
margin:0;
}

header p{
margin-top:14px;
color:var(--muted);
}

/* NAV */

nav{
position:sticky;
top:0;
z-index:999;
background:rgba(4,18,40,.85);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}

.nav-wrap{
max-width:1300px;
margin:auto;
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;
}

.nav-wrap button{
flex:0 0 auto;
border:1px solid var(--border);
padding:10px 18px;
border-radius:40px;
background:var(--glass);
color:var(--text);
font-weight:600;
cursor:pointer;
}

.nav-wrap button.active{
background:linear-gradient(120deg,#1c5fe0,#4b90ff);
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:40px 16px;
}

/* TOOL */

.tool{
display:none;
background:linear-gradient(140deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
border:1px solid var(--border);
border-radius:28px;
padding:36px;
box-shadow:0 30px 80px rgba(0,0,0,.5);
}

.tool.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:24px;
}

label{
font-size:12px;
font-weight:600;
color:var(--muted);
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,.05);
color:var(--text);
}

/* BUTTON */

.calc{
margin-top:24px;
padding:14px 30px;
border-radius:14px;
border:none;
background:linear-gradient(120deg,#1c5fe0,#4b90ff);
color:white;
font-weight:700;
cursor:pointer;
}

/* RESULT */

.result{
margin-top:18px;
background:rgba(16,76,160,.25);
padding:16px;
border-radius:12px;
border:1px solid var(--border);
}

/* VIEWER */

.viewer{
width:100%;
height:320px;
margin-top:20px;
border-radius:10px;
background:#0b1c33;
}

</style>
</head>

<body>

<header>

<h1>Engineering Calculation Tools</h1>

<p>Industrial mesh and wire engineering calculators.</p>

</header>

<nav>

<div class="nav-wrap">

<button class="active" onclick="showTool(this,'chain')">Chainlink</button>

</div>

</nav>

<div class="container">

<section id="chain" class="tool active">

<h2>Chainlink Mesh Calculator</h2>

<div class="grid">

<div>
<label>Material</label>
<select id="cl_mat">
<option value="7850">MS / GI</option>
<option value="8000">SS</option>
</select>
</div>

<div>
<label>Wire Dia (mm)</label>
<input id="cl_d" value="3">
</div>

<div>
<label>Mesh (mm)</label>
<input id="cl_m" value="50">
</div>

<div>
<label>Width (m)</label>
<input id="cl_w" value="1">
</div>

<div>
<label>Length (m)</label>
<input id="cl_l" value="10">
</div>

</div>

<button class="calc" onclick="calcChain()">Calculate</button>

<div class="result" id="cl_r"></div>

<div id="viewer" class="viewer"></div>

</section>

</div>

<script>

/* NAV */

function showTool(btn,id){

document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'))
document.querySelectorAll('.nav-wrap button').forEach(b=>b.classList.remove('active'))

document.getElementById(id).classList.add('active')
btn.classList.add('active')

}

/* CHAIN CALCULATION */

function calcChain(){

let dens=+cl_mat.value
let d=+cl_d.value/1000
let mesh=+cl_m.value/1000
let w=+cl_w.value
let l=+cl_l.value

let factor=1.414

let wireLength=(w*l/mesh)*factor

let cross=(Math.PI*d*d)/4

let weight=wireLength*cross*dens

cl_r.innerHTML=`
Wire Length: ${wireLength.toFixed(2)} m<br>
Weight: <b>${weight.toFixed(2)} kg</b>
`

generateMesh(mesh,d)

}

/* 3D MODEL */

function generateMesh(mesh,wire){

const container=document.getElementById("viewer")

container.innerHTML=""

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
45,
container.clientWidth/container.clientHeight,
0.1,
1000
)

camera.position.set(0,3,6)

let renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(container.clientWidth,container.clientHeight)

container.appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,1)

light.position.set(5,5,5)

scene.add(light)

let group=new THREE.Group()

let spacing=mesh*20

for(let i=-3;i<=3;i+=mesh*20){

let geo=new THREE.CylinderGeometry(wire*20,wire*20,8)

let mat=new THREE.MeshStandardMaterial({color:0xd0d0d0})

let line=new THREE.Mesh(geo,mat)

line.rotation.z=Math.PI/4
line.position.y=i

group.add(line)

}

for(let i=-3;i<=3;i+=mesh*20){

let geo=new THREE.CylinderGeometry(wire*20,wire*20,8)

let mat=new THREE.MeshStandardMaterial({color:0xd0d0d0})

let line=new THREE.Mesh(geo,mat)

line.rotation.z=-Math.PI/4
line.position.y=i

group.add(line)

}

scene.add(group)

function animate(){

requestAnimationFrame(animate)

group.rotation.y+=0.01

renderer.render(scene,camera)

}

animate()

}

</script>

</body>
</html>
