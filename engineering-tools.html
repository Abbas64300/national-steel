<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engineering Tools | National Steel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#061426;
  --navy2:#0b2f55;
  --accent:#0d4ea6;
  --glass:rgba(255,255,255,0.06);
  --border:rgba(255,255,255,0.08);
  --text:#e8eef6;
  --muted:#a9b4c2;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:linear-gradient(135deg,var(--navy),#02101f);
  color:var(--text);
}
header{
  padding:80px 22px;
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  border-bottom:1px solid var(--border);
}
header h1{
  font-family:"IBM Plex Sans",sans-serif;
  font-size:42px;
  margin:0;
}
header p{
  margin-top:16px;
  font-size:16px;
  color:var(--muted);
}
nav{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
}
.nav-wrap{
  max-width:1300px;
  margin:auto;
  padding:16px 20px;
  display:flex;
  gap:12px;
  overflow-x:auto;
}
.nav-wrap button{
  border:1px solid var(--border);
  padding:10px 20px;
  border-radius:999px;
  background:transparent;
  color:var(--text);
  font-weight:600;
  cursor:pointer;
}
.nav-wrap button.active{
  background:var(--accent);
  border-color:var(--accent);
}
.container{
  max-width:1200px;
  margin:auto;
  padding:70px 18px;
}
.tool{
  display:none;
  background:var(--glass);
  border:1px solid var(--border);
  border-radius:28px;
  backdrop-filter:blur(14px);
  padding:48px;
  box-shadow:0 30px 80px rgba(0,0,0,.5);
}
.tool.active{display:block}
h2{
  font-family:"IBM Plex Sans",sans-serif;
  font-size:30px;
  margin-top:0;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin-top:30px;
}
label{
  font-size:12px;
  font-weight:600;
  color:var(--muted);
}
input,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04);
  color:var(--text);
}
.calc{
  margin-top:34px;
  padding:14px 32px;
  border-radius:14px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-weight:700;
  cursor:pointer;
}
.result{
  margin-top:28px;
  background:rgba(13,78,166,0.1);
  padding:26px;
  border-radius:18px;
  font-size:14px;
  line-height:1.8;
  border:1px solid var(--border);
}
.note{
  margin-top:14px;
  font-size:12px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
<h1>Engineering Calculation Tools</h1>
<p>Industrial-grade engineering calculators aligned with EPC, OEM & infrastructure standards.</p>
</header>

<nav>
<div class="nav-wrap">
<button class="active" onclick="showTool(this,'chain')">Chainlink</button>
<button onclick="showTool(this,'barb')">Barbed Wire</button>
</div>
</nav>

<div class="container">

<!-- CHAINLINK -->
<section id="chain" class="tool active">
<h2>Chainlink Mesh Calculator</h2>
<div class="grid">
<div><label>Material Density (kg/m³)</label>
<select id="cl_mat">
<option value="7850">MS / GI - 7850</option>
<option value="8000">SS - 8000</option>
</select></div>
<div><label>Wire Dia (mm)</label><input id="cl_d" value="3"></div>
<div><label>Mesh Size (mm)</label><input id="cl_m" value="50"></div>
<div><label>Width (m)</label><input id="cl_w" value="1"></div>
<div><label>Length (m)</label><input id="cl_l" value="10"></div>
</div>
<button class="calc" onclick="calcChain()">Calculate</button>
<div class="result" id="cl_r"></div>
<div class="note">Diamond mesh formula | ±1%</div>
</section>

<!-- BARBED -->
<section id="barb" class="tool">
<h2>Barbed Wire Calculator</h2>
<div class="grid">
<div><label>Material Density (kg/m³)</label>
<select id="bw_mat">
<option value="7850">MS / GI - 7850</option>
</select></div>
<div><label>Main Wire Dia (mm)</label><input id="bw_d" value="2.5"></div>
<div><label>Barb Wire Dia (mm)</label><input id="bw_bd" value="2"></div>
<div><label>Barb Spacing (mm)</label><input id="bw_s" value="100"></div>
<div><label>Total Length (m)</label><input id="bw_l" value="100"></div>
</div>
<button class="calc" onclick="calcBarb()">Calculate</button>
<div class="result" id="bw_r"></div>
<div class="note">2-point barb logic | ±1%</div>
</section>

</div>

<script>
function showTool(btn,id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
btn.classList.add('active');
}

/* CHAINLINK */
function calcChain(){
let dens=+cl_mat.value;
let d=+cl_d.value/1000;
let mesh=+cl_m.value/1000;
let w=+cl_w.value;
let l=+cl_l.value;

let factor=1.414; // diamond factor
let wireLength=(w*l/mesh)*factor;
let cross=(Math.PI*d*d)/4;
let weight=wireLength*cross*dens;

cl_r.innerHTML=`
<b>Engineering Summary</b><br>
Total wire length: ${wireLength.toFixed(2)} m<br>
Cross section: ${cross.toExponential(4)} m²<br>
Calculated weight: <b>${weight.toFixed(2)} kg</b>
`;
}

/* BARBED */
function calcBarb(){
let dens=+bw_mat.value;
let d=+bw_d.value/1000;
let bd=+bw_bd.value/1000;
let spacing=+bw_s.value/1000;
let length=+bw_l.value;

let mainLength=length*2; // double twisted
let barbCount=length/spacing;
let barbLength=barbCount*0.10; // 100mm per barb approx

let mainWeight=mainLength*(Math.PI*d*d/4)*dens;
let barbWeight=barbLength*(Math.PI*bd*bd/4)*dens;

let total=mainWeight+barbWeight;

bw_r.innerHTML=`
<b>Engineering Summary</b><br>
Main wire weight: ${mainWeight.toFixed(2)} kg<br>
Barb wire weight: ${barbWeight.toFixed(2)} kg<br>
Total weight: <b>${total.toFixed(2)} kg</b>
`;
}
</script>

</body>
</html>
