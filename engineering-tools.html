<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engineering Tools | National Steel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --navy:#071a2e;
  --navy2:#0b3a68;
  --accent:#0d4ea6;
  --bg:#f4f7fb;
  --card:#ffffff;
  --border:#e5e7eb;
  --muted:#6b7280;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:#0b1f33;
}

/* HEADER */
header{
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  color:#fff;
  padding:70px 22px;
}
header h1{
  font-family:"IBM Plex Sans",sans-serif;
  font-size:40px;
  margin:0;
}
header p{
  max-width:820px;
  margin-top:14px;
  font-size:17px;
  opacity:.9;
}

/* NAV */
nav{
  position:sticky;
  top:0;
  z-index:100;
  background:#fff;
  border-bottom:1px solid var(--border);
}
.nav-wrap{
  max-width:1200px;
  margin:auto;
  padding:14px 18px;
  display:flex;
  gap:14px;
  overflow-x:auto;
}
.nav-wrap button{
  border:none;
  padding:10px 20px;
  border-radius:999px;
  background:#eef2f7;
  font-weight:700;
  cursor:pointer;
}
.nav-wrap button.active{
  background:var(--accent);
  color:#fff;
}

/* LAYOUT */
.container{
  max-width:1200px;
  margin:auto;
  padding:70px 18px;
}
.tool{
  display:none;
  background:var(--card);
  border-radius:26px;
  box-shadow:0 30px 70px rgba(0,0,0,.08);
  padding:46px;
}
.tool.active{display:block}

h2{
  font-family:"IBM Plex Sans",sans-serif;
  font-size:28px;
  margin-top:0;
}

/* FORM GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-top:26px;
}
label{
  font-weight:600;
  font-size:13px;
}
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
}

/* BUTTON */
.calc{
  margin-top:28px;
  padding:14px 30px;
  border-radius:14px;
  border:none;
  background:var(--accent);
  color:#fff;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
}

/* RESULT */
.result{
  margin-top:22px;
  background:#eef4ff;
  padding:20px;
  border-radius:16px;
  font-weight:700;
  font-size:16px;
}
.note{
  margin-top:10px;
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<header>
  <h1>Engineering Calculation Tools</h1>
  <p>Industrial-grade calculators based on manufacturing, EPC & OEM engineering practices.</p>
</header>

<nav>
  <div class="nav-wrap">
    <button class="active" onclick="showTool(this,'ss')">SS Wire Mesh</button>
    <button onclick="showTool(this,'perf')">Perforated Sheet</button>
    <button onclick="showTool(this,'spring')">Spring Steel</button>
    <button onclick="showTool(this,'welded')">Welded Mesh</button>
  </div>
</nav>

<div class="container">

<!-- SS WIRE MESH -->
<section id="ss" class="tool active">
<h2>Stainless / GI / MS Wire Mesh</h2>
<div class="grid">
<div><label>Weave Type</label>
<select id="ss_weave">
<option value="1">Plain Woven</option>
<option value="1.08">Crimped</option>
<option value="1.15">Welded</option>
</select></div>

<div><label>Material</label>
<select id="ss_mat">
<option value="7850">MS</option>
<option value="7850">GI</option>
<option value="8000">SS 304</option>
<option value="8050">SS 310</option>
<option value="8000">SS 316</option>
</select></div>

<div><label>Mesh / Inch</label><input id="ss_m" value="30"></div>
<div><label>Wire Dia (mm)</label><input id="ss_d" value="0.30"></div>
<div><label>Width (m)</label><input id="ss_w" value="1"></div>
<div><label>Length (m)</label><input id="ss_l" value="30"></div>
</div>
<button class="calc" onclick="calcSS()">Calculate</button>
<div class="result" id="ss_r"></div>
<div class="note">Weave factor & material density applied | ±1%</div>
</section>

<!-- PERFORATED -->
<section id="perf" class="tool">
<h2>Perforated Sheet</h2>
<div class="grid">
<div><label>Material</label>
<select id="pf_mat">
<option value="7850">MS</option>
<option value="7850">GI</option>
<option value="8000">SS 304</option>
<option value="8000">SS 316</option>
</select></div>
<div><label>Hole Dia (mm)</label><input id="pf_h" value="6"></div>
<div><label>Pitch (mm)</label><input id="pf_p" value="10"></div>
<div><label>Thickness (mm)</label><input id="pf_t" value="1.6"></div>
<div><label>Area (m²)</label><input id="pf_a" value="1"></div>
</div>
<button class="calc" onclick="calcPerf()">Calculate</button>
<div class="result" id="pf_r"></div>
</section>

<!-- SPRING -->
<section id="spring" class="tool">
<h2>Spring Steel / Sheet</h2>
<div class="grid">
<div><label>Material</label>
<select id="sp_mat">
<option value="7850">MS</option>
<option value="8000">SS 304</option>
<option value="8050">SS 310</option>
<option value="8000">SS 316</option>
</select></div>
<div><label>Thickness (mm)</label><input id="sp_t" value="2"></div>
<div><label>Width (m)</label><input id="sp_w" value="1"></div>
<div><label>Length (m)</label><input id="sp_l" value="2"></div>
</div>
<button class="calc" onclick="calcSpring()">Calculate</button>
<div class="result" id="sp_r"></div>
</section>

<!-- WELDED MESH -->
<section id="welded" class="tool">
<h2>Welded Wire Mesh Calculator</h2>
<div class="grid">
<div><label>Material</label>
<select id="wm_mat">
<option value="7850">MS</option>
<option value="7850">GI</option>
<option value="8000">SS</option>
</select></div>
<div><label>Wire Dia (mm)</label><input id="wm_d" value="4"></div>
<div><label>Hole Size (mm)</label><input id="wm_h" value="50"></div>
<div><label>Width (m)</label><input id="wm_w" value="1"></div>
<div><label>Length (m)</label><input id="wm_l" value="2"></div>
</div>
<button class="calc" onclick="calcWelded()">Calculate</button>
<div class="result" id="wm_r"></div>
<div class="note">Includes weld overlap factor | ±1%</div>
</section>

</div>

<script>
function showTool(btn,id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'));
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
document.getElementById(id).classList.add('active');
btn.classList.add('active');
}

/* SS MESH */
function calcSS(){
let mesh=+ss_m.value, d=+ss_d.value/1000, w=+ss_w.value, l=+ss_l.value;
let dens=+ss_mat.value, weave=+ss_weave.value;
let wires=mesh*39.37;
let total=(w+l)*wires;
let wt=total*(Math.PI*d*d/4)*dens*weave;
ss_r.innerHTML=Estimated Weight: <b>${wt.toFixed(2)} kg</b>;
}

/* PERFORATED */
function calcPerf(){
let dens=+pf_mat.value, h=+pf_h.value, p=+pf_p.value;
let t=+pf_t.value/1000, a=+pf_a.value;
let open=(Math.PI*(h/2)*(h/2))/(p*p);
let wt=a*t*dens*(1-open);
pf_r.innerHTML=Open Area: <b>${(open*100).toFixed(2)}%</b> | Weight: <b>${wt.toFixed(2)} kg</b>;
}

/* SPRING */
function calcSpring(){
let wt=(+sp_t.value/1000)(+sp_w.value)(+sp_l.value)*(+sp_mat.value);
sp_r.innerHTML=Weight: <b>${wt.toFixed(2)} kg</b>;
}

/* WELDED MESH */
function calcWelded(){
let dens=+wm_mat.value;
let d=+wm_d.value/1000;
let hole=+wm_h.value/1000;
let w=+wm_w.value, l=+wm_l.value;

let vert=(w/hole)+1;
let hor=(l/hole)+1;
let wireLen=(vert*l)+(hor*w);
let wt=wireLen*(Math.PI*d*d/4)*dens*1.03;

wm_r.innerHTML=Estimated Weight: <b>${wt.toFixed(2)} kg</b>;
}
</script>

</body>
</html>
