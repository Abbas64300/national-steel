!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Engineering Tools | National Steel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Sans:wght@600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Inter;
background:#02101f;
color:white;
}

header{
padding:50px 20px;
background:#0b2f55;
}

nav{
background:#07162f;
}

.nav-wrap{
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;
}

.nav-wrap button{
padding:10px 16px;
background:#0a1a33;
border:1px solid #1f355f;
color:white;
border-radius:20px;
cursor:pointer;
}

.nav-wrap button.active{
background:#3b82ff;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.tool{
display:none;
background:#0a1a33;
padding:30px;
border-radius:12px;
margin-bottom:20px;
}

.tool.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #1f355f;
background:#08152c;
color:white;
width:100%;
}

.calc{
margin-top:20px;
padding:12px;
background:#3b82ff;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
background:#08152c;
padding:15px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>Engineering Calculation Tools</h1>
</header>

<nav>

<div class="nav-wrap">

<button class="active" data-tool="chain">Chainlink</button>
<button data-tool="barb">Barbed</button>
<button data-tool="perf">Perforated</button>
<button data-tool="weld">Weld Mesh</button>
<button data-tool="ss">SS Mesh</button>
<button data-tool="crimp">Crimp Mesh</button>
<button data-tool="extruder">Extruder</button>

</div>

</nav>

<div class="container">

<!-- CHAINLINK -->

<section id="chain" class="tool active">

<h2>Chainlink Mesh</h2>

<div class="grid">

<select id="cl_mat">
<option value="7850">MS/GI</option>
<option value="8000">SS</option>
</select>

<input id="cl_d" placeholder="Wire Dia mm">
<input id="cl_m" placeholder="Mesh mm">
<input id="cl_w" placeholder="Width m">
<input id="cl_l" placeholder="Length m">

</div>

<button class="calc" onclick="calcChain()">Calculate</button>

<div id="cl_r" class="result"></div>

</section>

<!-- BARBED -->

<section id="barb" class="tool">

<h2>Barbed Wire</h2>

<div class="grid">

<input id="bw_d" placeholder="Main wire mm">
<input id="bw_bd" placeholder="Barb mm">
<input id="bw_s" placeholder="Spacing mm">
<input id="bw_l" placeholder="Length m">

</div>

<button class="calc" onclick="calcBarb()">Calculate</button>

<div id="bw_r" class="result"></div>

</section>

<!-- PERFORATED -->

<section id="perf" class="tool">

<h2>Perforated Sheet</h2>

<div class="grid">

<input id="pf_hole" placeholder="Hole mm">
<input id="pf_pitch" placeholder="Pitch mm">
<input id="pf_l" placeholder="Length mm">
<input id="pf_w" placeholder="Width mm">

</div>

<button class="calc" onclick="calcPerf()">Calculate</button>

<div id="pf_r" class="result"></div>

</section>

<!-- WELD -->

<section id="weld" class="tool">

<h2>Weld Mesh</h2>

<div class="grid">

<input id="wm_d" placeholder="Wire mm">
<input id="wm_h" placeholder="Hole mm">
<input id="wm_w" placeholder="Width m">
<input id="wm_l" placeholder="Length m">

</div>

<button class="calc" onclick="calcWeld()">Calculate</button>

<div id="wm_r" class="result"></div>

</section>

<!-- SS -->

<section id="ss" class="tool">

<h2>SS Wire Mesh</h2>

<div class="grid">

<input id="ss_d" placeholder="Wire mm">
<input id="ss_h" placeholder="Opening mm">
<input id="ss_w" placeholder="Width m">
<input id="ss_l" placeholder="Length m">

</div>

<button class="calc" onclick="calcSS()">Calculate</button>

<div id="ss_r" class="result"></div>

</section>

<!-- CRIMP -->

<section id="crimp" class="tool">

<h2>Crimp Mesh</h2>

<div class="grid">

<input id="cr_d" placeholder="Wire mm">
<input id="cr_h" placeholder="Opening mm">
<input id="cr_w" placeholder="Width m">
<input id="cr_l" placeholder="Length m">

</div>

<button class="calc" onclick="calcCrimp()">Calculate</button>

<div id="cr_r" class="result"></div>

</section>

<!-- EXTRUDER -->

<section id="extruder" class="tool">

<h2>Extruder Screen</h2>

<div class="grid">

<select id="ex_mat">
<option value="8000">SS304</option>
<option value="8000">SS310</option>
</select>

<input id="ex_open" placeholder="Opening mm">
<input id="ex_wire" placeholder="Wire mm">
<input id="ex_dia" placeholder="Diameter mm">

</div>

<button class="calc" onclick="calcExtruder()">Calculate</button>

<div id="ex_r" class="result"></div>

</section>

</div>

<script>

/* NAVIGATION */

document.querySelectorAll(".nav-wrap button").forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelectorAll(".tool").forEach(t=>t.classList.remove("active"))
document.querySelectorAll(".nav-wrap button").forEach(b=>b.classList.remove("active"))

document.getElementById(btn.dataset.tool).classList.add("active")

btn.classList.add("active")

})

})

/* CHAIN */

function calcChain(){

let dens=+cl_mat.value
let d=+cl_d.value/1000
let mesh=+cl_m.value/1000
let w=+cl_w.value
let l=+cl_l.value

let factor=1.414

let wireLength=(w*l/mesh)*factor

let cross=(Math.PI*d*d)/4

let weight=wireLength*cross*dens

cl_r.innerHTML=Weight: ${weight.toFixed(2)} kg

}

/* BARBED */

function calcBarb(){

let d=+bw_d.value/1000
let bd=+bw_bd.value/1000
let spacing=+bw_s.value/1000
let length=+bw_l.value
let dens=7850

let mainLength=length*2
let barbCount=length/spacing
let barbLength=barbCount*0.1

let mainWeight=mainLength*(Math.PI*d*d/4)*dens
let barbWeight=barbLength*(Math.PI*bd*bd/4)*dens

bw_r.innerHTML=Weight: ${(mainWeight+barbWeight).toFixed(2)} kg

}

/* PERFORATED */

function calcPerf(){

let hole=+pf_hole.value
let pitch=+pf_pitch.value
let l=+pf_l.value
let w=+pf_w.value

let sheetArea=l*w
let holeArea=Math.PI*(hole/2)*(hole/2)
let holes=(l/pitch)*(w/pitch)

let openArea=(holeArea*holes)/sheetArea*100

pf_r.innerHTML=Open Area: ${openArea.toFixed(2)} %

}

/* WELD */

function calcWeld(){

let d=+wm_d.value/1000
let hole=+wm_h.value/1000
let w=+wm_w.value
let l=+wm_l.value

let wiresX=w/hole
let wiresY=l/hole

let totalWire=(wiresX*l)+(wiresY*w)

let weight=totalWire*(Math.PI*d*d/4)*7850

wm_r.innerHTML=Weight: ${weight.toFixed(2)} kg

}

/* SS */

function calcSS(){

let d=+ss_d.value/1000
let hole=+ss_h.value/1000
let w=+ss_w.value
let l=+ss_l.value

let wires=(w/hole)+(l/hole)

let length=wires*(l+w)/2

let weight=length*(Math.PI*d*d/4)*8000

ss_r.innerHTML=Weight: ${weight.toFixed(2)} kg

}

/* CRIMP */

function calcCrimp(){

let d=+cr_d.value/1000
let hole=+cr_h.value/1000
let w=+cr_w.value
let l=+cr_l.value

let wires=(w/hole)+(l/hole)

let length=wires*(l+w)/2

let weight=length*(Math.PI*d*d/4)*7850

cr_r.innerHTML=Weight: ${weight.toFixed(2)} kg

}

/* EXTRUDER */

function calcExtruder(){

let dens=+ex_mat.value
let open=+ex_open.value
let wire=+ex_wire.value
let dia=+ex_dia.value

let mesh=25.4/(open+wire)

let area=Math.PI*(dia/2)*(dia/2)

let wireLength=mesh*mesh*Math.sqrt(area)

let cross=Math.PI*(wire/1000)*(wire/1000)/4

let weight=wireLength*cross*dens

ex_r.innerHTML=Mesh: ${mesh.toFixed(2)}<br>Weight: ${weight.toFixed(2)} kg

}

</script>

</body>
</html>
