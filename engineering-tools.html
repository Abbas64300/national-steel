<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Engineering Tools | National Steel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Sans:wght@600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

:root{
--navy:#051326;
--navy2:#0b2f55;
--accent:#3b82ff;
--border:rgba(255,255,255,0.15);
--text:#e8eef6;
}

body{
margin:0;
font-family:Inter;
background:linear-gradient(140deg,#02101f,#051a33);
color:var(--text);
}

header{
padding:60px 20px;
background:linear-gradient(120deg,var(--navy),var(--navy2));
}

nav{
background:#07162f;
border-bottom:1px solid var(--border);
}

.nav-wrap{
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;
}

.nav-wrap button{
padding:10px 18px;
border-radius:30px;
border:1px solid var(--border);
background:#0a1a33;
color:white;
cursor:pointer;
}

.nav-wrap button.active{
background:#3b82ff;
}

.container{
max-width:1100px;
margin:auto;
padding:30px 16px;
}

.tool{
display:none;
background:#0a1a33;
padding:28px;
border-radius:16px;
margin-bottom:20px;
}

.tool.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
margin-top:20px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid #1f355f;
background:#08152c;
color:white;
width:100%;
}

.calc{
margin-top:20px;
padding:12px 20px;
border:none;
background:#3b82ff;
border-radius:10px;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
background:#08152c;
padding:15px;
border-radius:10px;
}

.viewer{
height:260px;
margin-top:20px;
background:#08152c;
border-radius:10px;
}

</style>
</head>

<body>

<header>
<h1>Engineering Calculation Tools</h1>
</header>

<nav>
<div class="nav-wrap">

<button class="active" data-tool="chain">Chainlink</button>
<button data-tool="perf">Perforated</button>
<button data-tool="barb">Barbed</button>
<button data-tool="weld">Weld Mesh</button>
<button data-tool="ss">SS Mesh</button>
<button data-tool="crimp">Crimp Mesh</button>
<button data-tool="extruder">Extruder</button>

</div>
</nav>

<div class="container">

<!-- CHAINLINK -->

<section id="chain" class="tool active">

<h2>Chainlink Mesh</h2>

<div class="grid">

<select id="cl_mat">
<option value="7850">MS/GI</option>
<option value="8000">SS</option>
</select>

<input id="cl_d" placeholder="Wire Dia mm">
<input id="cl_m" placeholder="Mesh mm">
<input id="cl_w" placeholder="Width m">
<input id="cl_l" placeholder="Length m">

</div>

<button class="calc" onclick="calcChain()">Calculate</button>

<div id="cl_r" class="result"></div>

<div id="chain3d" class="viewer"></div>

</section>

<!-- PERFORATED -->

<section id="perf" class="tool">

<h2>Perforated Sheet</h2>

<div class="grid">

<input id="pf_hole" placeholder="Hole mm">
<input id="pf_pitch" placeholder="Pitch mm">
<input id="pf_l" placeholder="Length mm">
<input id="pf_w" placeholder="Width mm">

</div>

<button class="calc" onclick="calcPerf()">Calculate</button>

<div id="pf_r" class="result"></div>

<div id="perf3d" class="viewer"></div>

</section>

</div>

<script>

/* SAFE NAVIGATION */

document.querySelectorAll(".nav-wrap button").forEach(btn=>{

btn.addEventListener("click",()=>{

document.querySelectorAll(".tool").forEach(t=>t.classList.remove("active"))
document.querySelectorAll(".nav-wrap button").forEach(b=>b.classList.remove("active"))

let id=btn.dataset.tool
document.getElementById(id).classList.add("active")

btn.classList.add("active")

})

})

/* CHAIN CALCULATION */

function calcChain(){

let dens=+cl_mat.value
let d=+cl_d.value/1000
let mesh=+cl_m.value/1000
let w=+cl_w.value
let l=+cl_l.value

let factor=1.414

let wireLength=(w*l/mesh)*factor

let cross=(Math.PI*d*d)/4

let weight=wireLength*cross*dens

cl_r.innerHTML=Weight: ${weight.toFixed(2)} kg

renderChain(mesh,d)

}

/* 3D CHAINLINK */

function renderChain(mesh,wire){

let container=document.getElementById("chain3d")
container.innerHTML=""

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
45,
container.clientWidth/container.clientHeight,
0.1,
1000
)

camera.position.set(0,3,6)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(container.clientWidth,container.clientHeight)

container.appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,5,5)
scene.add(light)

let group=new THREE.Group()

let spacing=mesh*20

for(let i=-3;i<=3;i+=mesh*20){

let geo=new THREE.CylinderGeometry(wire*20,wire*20,8)
let mat=new THREE.MeshStandardMaterial({color:0xd0d0d0})

let line=new THREE.Mesh(geo,mat)

line.rotation.z=Math.PI/4
line.position.y=i

group.add(line)

}

for(let i=-3;i<=3;i+=mesh*20){

let geo=new THREE.CylinderGeometry(wire*20,wire*20,8)
let mat=new THREE.MeshStandardMaterial({color:0xd0d0d0})

let line=new THREE.Mesh(geo,mat)

line.rotation.z=-Math.PI/4
line.position.y=i

group.add(line)

}

scene.add(group)

function animate(){
requestAnimationFrame(animate)
group.rotation.y+=0.01
renderer.render(scene,camera)
}

animate()

}

/* PERFORATED */

function calcPerf(){

let hole=+pf_hole.value
let pitch=+pf_pitch.value
let l=+pf_l.value
let w=+pf_w.value

let sheetArea=l*w
let holeArea=Math.PI*(hole/2)*(hole/2)
let holes=(l/pitch)*(w/pitch)

let openArea=(holeArea*holes)/sheetArea*100

pf_r.innerHTML=Open Area: ${openArea.toFixed(2)} %

renderPerf(hole,pitch)

}

/* 3D PERFORATED */

function renderPerf(hole,pitch){

let container=document.getElementById("perf3d")
container.innerHTML=""

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
45,
container.clientWidth/container.clientHeight,
0.1,
1000
)

camera.position.set(0,3,6)

let renderer=new THREE.WebGLRenderer({antialias:true})
renderer.setSize(container.clientWidth,container.clientHeight)

container.appendChild(renderer.domElement)

let light=new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,5,5)
scene.add(light)

let plate=new THREE.Mesh(
new THREE.BoxGeometry(6,0.2,6),
new THREE.MeshStandardMaterial({color:0x777777})
)

scene.add(plate)

function animate(){
requestAnimationFrame(animate)
plate.rotation.y+=0.01
renderer.render(scene,camera)
}

animate()

}

</script>

</body>
</html>
