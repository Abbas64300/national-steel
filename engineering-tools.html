<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Engineering Tools | National Steel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@600;700&display=swap" rel="stylesheet">

<style>

:root{

--navy:#051326;
--navy2:#0b2f55;
--accent:#2f7cff;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.15);
--text:#e8eef6;
--muted:#9fb0c5;

}

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Inter;
background:
radial-gradient(circle at 20% 10%,#0e3a73,transparent 50%),
linear-gradient(140deg,#02101f,#051a33);

color:var(--text);

}

/* HEADER */

header{

padding:70px 20px;
border-bottom:1px solid var(--border);
background:linear-gradient(120deg,var(--navy),var(--navy2));

}

header h1{

font-family:"IBM Plex Sans";
font-size:36px;
margin:0;

}

header p{

margin-top:14px;
color:var(--muted);

}

/* NAVIGATION */

nav{

position:sticky;
top:0;
z-index:100;
background:rgba(4,18,40,.85);
backdrop-filter:blur(18px);
border-bottom:1px solid var(--border);

}

.nav-wrap{

max-width:1300px;
margin:auto;
padding:12px 14px;

display:flex;
gap:10px;
overflow-x:auto;

}

.nav-wrap button{

flex-shrink:0;

border:1px solid var(--border);
padding:10px 18px;
border-radius:40px;
background:var(--glass);
color:var(--text);
font-weight:600;
cursor:pointer;
transition:.25s;

}

.nav-wrap button:hover{

background:rgba(43,124,255,.2);

}

.nav-wrap button.active{

background:linear-gradient(120deg,#1c5fe0,#4b90ff);
border-color:#4b90ff;

}

/* MAIN */

.container{

max-width:1100px;
margin:auto;
padding:40px 16px;

}

/* TOOL CARD */

.tool{

display:none;

background:linear-gradient(140deg,rgba(255,255,255,.07),rgba(255,255,255,.03));
border:1px solid var(--border);
border-radius:28px;

padding:36px;

box-shadow:0 30px 80px rgba(0,0,0,.5);

}

.tool.active{
display:block;
}

h2{

font-family:"IBM Plex Sans";
margin-top:0;

}

/* GRID */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;

margin-top:26px;

}

label{

font-size:12px;
font-weight:600;
color:var(--muted);

}

input,select{

width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
background:rgba(255,255,255,.04);
color:var(--text);

}

/* BUTTON */

.calc{

margin-top:26px;

padding:14px 30px;

border-radius:14px;
border:none;

background:linear-gradient(120deg,#1c5fe0,#4b90ff);

font-weight:700;
color:white;

cursor:pointer;

}

/* RESULT */

.result{

margin-top:20px;

background:rgba(16,76,160,.2);
border:1px solid var(--border);

padding:18px;
border-radius:14px;

}

/* CANVAS */

canvas{

margin-top:20px;
max-width:100%;
background:white;
border-radius:8px;

}

</style>
</head>

<body>

<header>

<h1>Engineering Calculation Tools</h1>

<p>
Industrial mesh calculators used by EPC contractors and international clients.
</p>

</header>

<nav>

<div class="nav-wrap">

<button class="active" onclick="showTool(this,'chain')">Chainlink</button>
<button onclick="showTool(this,'barb')">Barbed</button>
<button onclick="showTool(this,'perf')">Perforated</button>
<button onclick="showTool(this,'weld')">Weld Mesh</button>
<button onclick="showTool(this,'ssmesh')">SS Mesh</button>
<button onclick="showTool(this,'crimp')">Crimp Mesh</button>
<button onclick="showTool(this,'extruder')">Extruder Screen</button>

</div>

</nav>

<div class="container">

<!-- CHAINLINK -->

<section id="chain" class="tool active">

<h2>Chainlink Mesh Calculator</h2>

<div class="grid">

<div>
<label>Material Density</label>
<select id="cl_mat">
<option value="7850">MS / GI</option>
<option value="8000">SS</option>
</select>
</div>

<div>
<label>Wire Dia (mm)</label>
<input id="cl_d">
</div>

<div>
<label>Mesh (mm)</label>
<input id="cl_m">
</div>

<div>
<label>Width (m)</label>
<input id="cl_w">
</div>

<div>
<label>Length (m)</label>
<input id="cl_l">
</div>

</div>

<button class="calc" onclick="calcChain()">Calculate</button>

<div class="result" id="cl_r"></div>

<canvas id="chain3d" width="420" height="200"></canvas>

</section>


<!-- WELD -->

<section id="weld" class="tool">

<h2>Weld Mesh Calculator</h2>

<div class="grid">

<div>
<label>Wire Dia mm</label>
<input id="wm_d">
</div>

<div>
<label>Hole mm</label>
<input id="wm_h">
</div>

<div>
<label>Width m</label>
<input id="wm_w">
</div>

<div>
<label>Length m</label>
<input id="wm_l">
</div>

</div>

<button class="calc" onclick="calcWeld()">Calculate</button>

<div class="result" id="wm_r"></div>

<canvas id="weld3d" width="420" height="200"></canvas>

</section>


<!-- SS MESH -->

<section id="ssmesh" class="tool">

<h2>SS Wire Mesh</h2>

<div class="grid">

<div>
<label>Wire Dia mm</label>
<input id="ss_d">
</div>

<div>
<label>Opening mm</label>
<input id="ss_h">
</div>

<div>
<label>Width m</label>
<input id="ss_w">
</div>

<div>
<label>Length m</label>
<input id="ss_l">
</div>

</div>

<button class="calc" onclick="calcSS()">Calculate</button>

<div class="result" id="ss_r"></div>

<canvas id="ss3d" width="420" height="200"></canvas>

</section>


<!-- CRIMP -->

<section id="crimp" class="tool">

<h2>GI Crimp Mesh</h2>

<div class="grid">

<div>
<label>Wire Dia</label>
<input id="cr_d">
</div>

<div>
<label>Opening</label>
<input id="cr_h">
</div>

<div>
<label>Width</label>
<input id="cr_w">
</div>

<div>
<label>Length</label>
<input id="cr_l">
</div>

</div>

<button class="calc" onclick="calcCrimp()">Calculate</button>

<div class="result" id="cr_r"></div>

<canvas id="crimp3d" width="420" height="200"></canvas>

</section>


<!-- EXTRUDER -->

<section id="extruder" class="tool">

<h2>SS Extruder Screen Calculator</h2>

<div class="grid">

<div>
<label>Material</label>
<select id="ex_mat">
<option value="8000">SS304</option>
<option value="8000">SS310</option>
</select>
</div>

<div>
<label>Opening mm</label>
<input id="ex_open">
</div>

<div>
<label>Wire Thickness mm</label>
<input id="ex_wire">
</div>

<div>
<label>Diameter mm</label>
<input id="ex_dia">
</div>

</div>

<button class="calc" onclick="calcExtruder()">Calculate</button>

<div class="result" id="ex_r"></div>

<canvas id="extrude3d" width="420" height="200"></canvas>

</section>

</div>

<script>

/* NAVIGATION FIX */

function showTool(btn,id){

document.querySelectorAll('.tool').forEach(t=>{
t.classList.remove('active')
})

document.querySelectorAll('.nav-wrap button').forEach(b=>{
b.classList.remove('active')
})

document.getElementById(id).classList.add('active')

btn.classList.add('active')

}

/* MESH DRAW */

function drawMesh(canvasID,size){

let ctx=document.getElementById(canvasID).getContext("2d")

ctx.clearRect(0,0,420,200)

for(let x=0;x<420;x+=size){

ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,200)
ctx.stroke()

}

for(let y=0;y<200;y+=size){

ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(420,y)
ctx.stroke()

}

}

/* CHAIN */

function calcChain(){

let dens=+cl_mat.value
let d=+cl_d.value/1000
let mesh=+cl_m.value/1000
let w=+cl_w.value
let l=+cl_l.value

let factor=1.414

let wireLength=(w*l/mesh)*factor

let cross=(Math.PI*d*d)/4

let weight=wireLength*cross*dens

cl_r.innerHTML=Weight: ${weight.toFixed(2)} kg

drawMesh("chain3d",20)

}

/* WELD */

function calcWeld(){

let d=+wm_d.value/1000
let hole=+wm_h.value/1000
let w=+wm_w.value
let l=+wm_l.value

let wiresX=w/hole
let wiresY=l/hole

let totalWire=(wiresX*l)+(wiresY*w)

let weight=totalWire*(Math.PI*d*d/4)*7850

wm_r.innerHTML=Weight: ${weight.toFixed(2)} kg

drawMesh("weld3d",18)

}

/* SS */

function calcSS(){

let d=+ss_d.value/1000
let hole=+ss_h.value/1000
let w=+ss_w.value
let l=+ss_l.value

let wires=(w/hole)+(l/hole)

let length=wires*(l+w)/2

let weight=length*(Math.PI*d*d/4)*8000

ss_r.innerHTML=Weight: ${weight.toFixed(2)} kg

drawMesh("ss3d",16)

}

/* CRIMP */

function calcCrimp(){

let d=+cr_d.value/1000
let hole=+cr_h.value/1000
let w=+cr_w.value
let l=+cr_l.value

let wires=(w/hole)+(l/hole)

let length=wires*(l+w)/2

let weight=length*(Math.PI*d*d/4)*7850

cr_r.innerHTML=Weight: ${weight.toFixed(2)} kg

drawMesh("crimp3d",16)

}

/* EXTRUDER */

function calcExtruder(){

let dens=+ex_mat.value
let open=+ex_open.value
let wire=+ex_wire.value
let dia=+ex_dia.value

let mesh=25.4/(open+wire)

let area=Math.PI*(dia/2)*(dia/2)

let wireLength=mesh*mesh*Math.sqrt(area)

let cross=Math.PI*(wire/1000)*(wire/1000)/4

let weight=wireLength*cross*dens

ex_r.innerHTML=Mesh Count: ${mesh.toFixed(2)}<br>Weight: ${weight.toFixed(2)} kg

drawMesh("extrude3d",14)

}

</script>

</body>
</html>
