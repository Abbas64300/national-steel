!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engineering Tools | National Steel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--navy:#051326;
--navy2:#0b2f55;
--accent:#0d4ea6;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.12);
--text:#e8eef6;
--muted:#9fb0c5;
--shadow:0 40px 100px rgba(0,0,0,.65);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:linear-gradient(140deg,#02101f,#051a33);
color:var(--text);
}

header{
padding:80px 22px;
border-bottom:1px solid var(--border);
background:linear-gradient(120deg,var(--navy),var(--navy2));
}

header h1{
font-family:"IBM Plex Sans";
font-size:42px;
margin:0;
}

header p{
margin-top:16px;
color:var(--muted);
}

nav{
position:sticky;
top:0;
background:rgba(4,18,40,.8);
backdrop-filter:blur(16px);
border-bottom:1px solid var(--border);
}

.nav-wrap{
max-width:1300px;
margin:auto;
padding:16px;
display:flex;
gap:12px;
overflow-x:auto;
}

.nav-wrap button{
border:1px solid var(--border);
padding:10px 22px;
border-radius:999px;
background:var(--glass);
color:var(--text);
font-weight:600;
cursor:pointer;
}

.nav-wrap button.active{
background:linear-gradient(120deg,#1b5fe0,#4e95ff);
}

.container{
max-width:1200px;
margin:auto;
padding:70px 18px;
}

.tool{
display:none;
background:var(--glass);
border:1px solid var(--border);
border-radius:30px;
padding:48px;
box-shadow:var(--shadow);
}

.tool.active{display:block}

h2{
font-family:"IBM Plex Sans";
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

label{
font-size:12px;
font-weight:600;
color:var(--muted);
}

input,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid var(--border);
background:rgba(255,255,255,0.04);
color:var(--text);
}

.calc{
margin-top:30px;
padding:14px 34px;
border-radius:16px;
border:none;
background:linear-gradient(120deg,#1b5fe0,#3c82ff);
color:#fff;
font-weight:700;
cursor:pointer;
}

.result{
margin-top:24px;
background:rgba(16,76,160,0.18);
padding:26px;
border-radius:18px;
border:1px solid var(--border);
}

canvas{
margin-top:25px;
background:#fff;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>Engineering Calculation Tools</h1>
<p>Industrial engineering calculators used by OEM and EPC companies.</p>
</header>

<nav>
<div class="nav-wrap">
<button class="active" onclick="showTool(this,'chain')">Chainlink</button>
<button onclick="showTool(this,'barb')">Barbed Wire</button>
<button onclick="showTool(this,'perf')">Perforated</button>
<button onclick="showTool(this,'weld')">Weld Mesh</button>
<button onclick="showTool(this,'ssmesh')">SS Mesh</button>
<button onclick="showTool(this,'crimp')">Crimp Mesh</button>
<button onclick="showTool(this,'extruder')">Extruder Screen</button>
</div>
</nav>

<div class="container">

<section id="chain" class="tool active">
<h2>Chainlink Mesh Calculator</h2>

<div class="grid">
<div><label>Density</label><select id="cl_mat"><option value="7850">MS/GI</option><option value="8000">SS</option></select></div>
<div><label>Wire Dia mm</label><input id="cl_d"></div>
<div><label>Mesh mm</label><input id="cl_m"></div>
<div><label>Width m</label><input id="cl_w"></div>
<div><label>Length m</label><input id="cl_l"></div>
</div>

<button class="calc" onclick="calcChain()">Calculate</button>

<div class="result" id="cl_r"></div>

<canvas id="chain3d" width="420" height="220"></canvas>

</section>


<section id="extruder" class="tool">

<h2>SS Extruder Screen Calculator</h2>

<div class="grid">

<div>
<label>Material</label>
<select id="ex_mat">
<option value="8000">SS304</option>
<option value="8000">SS310</option>
</select>
</div>

<div>
<label>Opening mm</label>
<input id="ex_open">
</div>

<div>
<label>Wire Thickness mm</label>
<input id="ex_wire">
</div>

<div>
<label>Diameter mm</label>
<input id="ex_dia">
</div>

</div>

<button class="calc" onclick="calcExtruder()">Calculate</button>

<div class="result" id="ex_r"></div>

<canvas id="extrude3d" width="420" height="220"></canvas>

</section>

</div>

<script>

function showTool(btn,id){
document.querySelectorAll('.tool').forEach(t=>t.classList.remove('active'))
document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'))
document.getElementById(id).classList.add('active')
btn.classList.add('active')
}

/* 3D MESH PREVIEW */

function drawMesh(canvasID,size){

let c=document.getElementById(canvasID).getContext("2d")

c.clearRect(0,0,420,220)

for(let x=0;x<420;x+=size){
c.beginPath()
c.moveTo(x,0)
c.lineTo(x,220)
c.stroke()
}

for(let y=0;y<220;y+=size){
c.beginPath()
c.moveTo(0,y)
c.lineTo(420,y)
c.stroke()
}

}

/* CHAIN */

function calcChain(){

let dens=+cl_mat.value
let d=+cl_d.value/1000
let mesh=+cl_m.value/1000
let w=+cl_w.value
let l=+cl_l.value

let factor=1.414

let wireLength=(w*l/mesh)*factor

let cross=(Math.PI*d*d)/4

let weight=wireLength*cross*dens

cl_r.innerHTML=Weight: ${weight.toFixed(2)} kg

drawMesh("chain3d",20)

}

/* EXTRUDER */

function calcExtruder(){

let dens=+ex_mat.value
let open=+ex_open.value
let wire=+ex_wire.value
let dia=+ex_dia.value

let mesh=25.4/(open+wire)

let area=Math.PI*(dia/2)*(dia/2)

let wireLength=mesh*mesh*Math.sqrt(area)

let cross=Math.PI*(wire/1000)*(wire/1000)/4

let weight=wireLength*cross*dens

ex_r.innerHTML=

`Mesh Count: ${mesh.toFixed(2)}<br>
Weight: ${weight.toFixed(2)} kg`

drawMesh("extrude3d",18)

}

</script>

</body>
</html>
