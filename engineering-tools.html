<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Engineering Tools | National Steel</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Sans:wght@600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three-csg-ts@3.0.0/dist/three-csg-ts.min.js"></script>

<style>

:root{
--navy:#051326;
--navy2:#0b2f55;
--accent:#3b82ff;
--glass:rgba(255,255,255,0.06);
--border:rgba(255,255,255,0.15);
--text:#e8eef6;
--muted:#9fb0c5;
}

body{
margin:0;
font-family:Inter;
background:
radial-gradient(circle at 20% 0%,#0e3a73,transparent 50%),
linear-gradient(140deg,#02101f,#051a33);
color:var(--text);
}

/* HEADER */

header{
padding:60px 20px;
background:linear-gradient(120deg,var(--navy),var(--navy2));
border-bottom:1px solid var(--border);
}

header h1{
margin:0;
font-family:"IBM Plex Sans";
}

/* NAV */

nav{
position:sticky;
top:0;
background:rgba(4,18,40,.9);
border-bottom:1px solid var(--border);
}

.nav-wrap{
display:flex;
gap:10px;
padding:12px;
overflow-x:auto;
}

.nav-wrap button{
border:1px solid var(--border);
padding:10px 18px;
border-radius:40px;
background:var(--glass);
color:white;
cursor:pointer;
}

.nav-wrap button.active{
background:linear-gradient(120deg,#1c5fe0,#4b90ff);
}

/* MAIN */

.container{
max-width:1100px;
margin:auto;
padding:30px 16px;
}

.tool{
display:none;
background:rgba(255,255,255,.05);
padding:30px;
border-radius:20px;
border:1px solid var(--border);
}

.tool.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
margin-top:20px;
}

input,select{
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:#0a1a33;
color:white;
width:100%;
}

.calc{
margin-top:20px;
padding:12px 24px;
border:none;
border-radius:10px;
background:#3b82ff;
color:white;
cursor:pointer;
}

.result{
margin-top:20px;
background:#0a1a33;
padding:15px;
border-radius:10px;
}

.viewer{
width:100%;
height:260px;
margin-top:20px;
background:#0a1a33;
border-radius:10px;
}

.spec{
margin-top:20px;
background:#08152c;
padding:16px;
border-radius:10px;
font-size:13px;
line-height:1.6;
}

</style>
</head>

<body>

<header>
<h1>Engineering Calculation Tools</h1>
</header>

<nav>
<div class="nav-wrap">

<button class="active" onclick="showTool(this,'chain')">Chainlink</button>
<button onclick="showTool(this,'perf')">Perforated</button>

</div>
</nav>

<div class="container">

<!-- CHAINLINK -->

<section id="chain" class="tool active">

<h2>Chainlink Mesh</h2>

<div class="grid">

<select id="cl_mat">
<option value="7850">MS/GI</option>
<option value="8000">SS</option>
</select>

<input id="cl_d" placeholder="Wire Dia mm">
<input id="cl_m" placeholder="Mesh mm">
<input id="cl_w" placeholder="Width m">
<input id="cl_l" placeholder="Length m">

</div>

<button class="calc" onclick="calcChain()">Calculate</button>

<div class="result" id="cl_r"></div>

<div id="chain3d" class="viewer"></div>

<div id="chainSpec" class="spec"></div>

</section>


<!-- PERFORATED -->

<section id="perf" class="tool">

<h2>Perforated Sheet</h2>

<div class="grid">

<input id="pf_hole" placeholder="Hole mm">
<input id="pf_pitch" placeholder="Pitch mm">
<input id="pf_t" placeholder="Thickness mm">
<input id="pf_l" placeholder="Length mm">
<input id="pf_w" placeholder="Width mm">

</div>

<button class="calc" onclick="calcPerf()">Calculate</button>

<div class="result" id="pf_r"></div>

<div id="perf3d" class="viewer"></div>

<div id="perfSpec" class="spec"></div>

</section>

</div>

<script>
