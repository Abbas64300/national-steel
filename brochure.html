<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>National Steel | Company Brochure</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="National Steel – Precision Engineered Wire Mesh Solutions for Global Industries.">

<style>
:root{
--navy:#0b1f33;
--deep:#071423;
--accent:#2563eb;
--green:#22c55e;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: 'Inter', Arial, sans-serif;
background:linear-gradient(180deg,var(--navy),var(--deep));
color:#ffffff;
}

/* HEADER */
.header{
text-align:center;
padding:60px 20px 40px;
}

.header h1{
font-size:42px;
font-weight:600;
letter-spacing:.5px;
margin-bottom:10px;
}

.header p{
opacity:.85;
font-size:18px;
}

/* PDF CONTAINER */
.catalogue-wrapper{
width:95%;
max-width:1400px;
margin:40px auto 80px;
border-radius:20px;
overflow:hidden;
box-shadow:0 40px 100px rgba(0,0,0,.6);
background:#ffffff;
}

/* FULL PDF VIEW */
.catalogue-wrapper iframe{
width:100%;
height:85vh;
border:none;
}

/* DOWNLOAD BUTTON */
.download-section{
text-align:center;
margin-bottom:80px;
}

.download-btn{
display:inline-block;
padding:14px 38px;
background:var(--green);
color:#071423;
border-radius:40px;
font-weight:600;
text-decoration:none;
font-size:16px;
transition:.25s ease;
}

.download-btn:hover{
transform:translateY(-2px);
opacity:.95;
}

/* FOOTER */
footer{
text-align:center;
padding:30px;
opacity:.7;
font-size:14px;
}

/* WHATSAPP FLOAT */
.whatsapp{
position:fixed;
right:25px;
bottom:25px;
width:60px;
height:60px;
background:#25D366;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 12px 30px rgba(0,0,0,.45);
z-index:999;
}

.whatsapp img{
width:34px;
height:34px;
}
</style>
</head>

<body>

<div class="header">
<h1>National Steel Company Brochure</h1>
<p>Precision Engineered Wire Mesh Solutions for Global Industries</p>
</div>

<div class="catalogue-wrapper">
<iframe src="/national-steel-catalogue.pdf"></iframe>
</div>

<div class="download-section">
<a href="/national-steel-catalogue.pdf" download class="download-btn">
Download Catalogue (PDF)
</a>
</div>

<footer>
© 2026 National Steel · Rajkot, Gujarat, India
</footer>

<a class="whatsapp" href="https://wa.me/917802021053" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg">
</a>

</body>
</html>
