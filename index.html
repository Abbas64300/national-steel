<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Engineering Tools | National Steel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Advanced wire mesh calculation tools by National Steel">
<meta name="author" content="National Steel">

<link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

<style>
:root{
    --bg:#0b1220;
    --panel:#020617;
    --accent:#38bdf8;
    --success:#22c55e;
    --text:#e5e7eb;
}
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Inter, Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
}
header{
    padding:70px 20px;
    text-align:center;
    background:linear-gradient(135deg,#020617,#0b1220);
}
header h1{font-size:44px;margin-bottom:8px;}
header p{opacity:.85;font-size:18px}

.container{
    max-width:1100px;
    margin:50px auto;
    padding:0 20px;
}

.panel{
    background:var(--panel);
    border-radius:16px;
    padding:35px;
    box-shadow:0 30px 80px rgba(0,0,0,.45);
}

.selector{
    display:flex;
    gap:20px;
    align-items:center;
    margin-bottom:30px;
}
.selector select{
    flex:1;
    padding:14px;
    border-radius:10px;
    background:#020617;
    color:#fff;
    border:1px solid #334155;
    font-size:16px;
}

.calc{
    display:none;
    animation:fade .4s ease;
}
.calc.active{display:block}

h2{
    border-left:5px solid var(--accent);
    padding-left:14px;
    margin-bottom:25px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:16px;
}

input,select{
    padding:13px;
    border-radius:10px;
    background:#020617;
    border:1px solid #334155;
    color:#fff;
}

button{
    margin-top:20px;
    padding:14px;
    width:100%;
    background:var(--accent);
    color:#020617;
    border:none;
    border-radius:12px;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
}
button:hover{opacity:.9}

.result{
    margin-top:18px;
    font-size:20px;
    color:var(--success);
}

.download{
    text-align:center;
    margin:60px 0;
}
.download a{
    padding:15px 34px;
    background:var(--success);
    color:#020617;
    border-radius:50px;
    font-weight:700;
    text-decoration:none;
}

footer{
    text-align:center;
    padding:30px;
    background:#020617;
    opacity:.8;
}

@keyframes fade{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:none}
}
</style>
</head>

<body>

<header data-aos="fade-down">
<h1>Engineering Tools</h1>
<p>Enterprise-grade wire mesh calculation suite</p>
</header>

<div class="container">
<div class="panel" data-aos="fade-up">

<div class="selector">
<select onchange="showCalc(this.value)">
<option value="">Select Calculator</option>
<option value="perforated">Perforated Sheet</option>
<option value="welded">Welded Mesh</option>
<option value="chain">Chain Link Mesh</option>
<option value="woven">Woven Wire Mesh</option>
</select>
</div>

<!-- PERFORATED -->
<div id="perforated" class="calc">
<h2>Perforated Sheet Weight</h2>
<div class="grid">
<input id="p_hole" placeholder="Hole Diameter (mm)">
<input id="p_pitch" placeholder="Pitch (mm) – optional">
<input id="p_thk" placeholder="Thickness (mm)">
<input id="p_len" placeholder="Length (m)">
<input id="p_wid" placeholder="Width (m)">
<select id="p_mat">
<option value="7850">MS / GI</option>
<option value="8000">SS 304</option>
<option value="8050">SS 310</option>
<option value="8020">SS 316</option>
</select>
</div>
<button onclick="calcPerforated()">Calculate</button>
<div class="result" id="p_result"></div>
</div>

<!-- WELDED -->
<div id="welded" class="calc">
<h2>Welded Mesh Weight</h2>
<div class="grid">
<input id="w_wire" placeholder="Wire Diameter (mm)">
<input id="w_space" placeholder="Spacing (mm)">
<input id="w_len" placeholder="Length (m)">
<input id="w_wid" placeholder="Width (m)">
<select id="w_mat">
<option value="7850">MS</option>
<option value="7850">GI</option>
</select>
</div>
<button onclick="calcWelded()">Calculate</button>
<div class="result" id="w_result"></div>
</div>

<!-- CHAIN -->
<div id="chain" class="calc">
<h2>Chain Link Mesh Weight</h2>
<div class="grid">
<input id="c_wire" placeholder="Wire Diameter (mm)">
<input id="c_hole" placeholder="Hole Size (mm)">
<input id="c_len" placeholder="Length (m)">
<input id="c_wid" placeholder="Width (m)">
<select id="c_mat">
<option value="7850">MS</option>
<option value="7850">GI</option>
</select>
</div>
<button onclick="calcChain()">Calculate</button>
<div class="result" id="c_result"></div>
</div>

<!-- WOVEN -->
<div id="woven" class="calc">
<h2>Woven Wire Mesh Weight</h2>
<div class="grid">
<input id="ww_wire" placeholder="Wire Diameter (mm)">
<input id="ww_hole" placeholder="Opening (mm)">
<input id="ww_len" placeholder="Length (m)">
<input id="ww_wid" placeholder="Width (m)">
<select id="ww_mat">
<option value="7850">MS</option>
<option value="7850">GI</option>
<option value="8000">SS 304</option>
<option value="8050">SS 310</option>
<option value="8020">SS 316</option>
</select>
</div>
<button onclick="calcWoven()">Calculate</button>
<div class="result" id="ww_result"></div>
</div>

</div>
</div>

<div class="download" data-aos="zoom-in">
<a href="brochure.pdf" download>⬇ Download Company Brochure</a>
</div>

<footer>
© 2026 National Steel · Industrial Engineering Excellence
</footer>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
AOS.init();

function showCalc(id){
document.querySelectorAll('.calc').forEach(c=>c.classList.remove('active'));
if(id) document.getElementById(id).classList.add('active');
}

/* === SAME VERIFIED FORMULAS === */
function calcPerforated(){
let d=p_hole.value/1000;
let p=p_pitch.value?p_pitch.value/1000:d*1.5;
let t=p_thk.value/1000;
let area=p_len.value*p_wid.value;
let density=p_mat.value;
let metal=1-(Math.PI*d*d/4)/(p*p);
p_result.innerHTML="Weight ≈ "+(metal*area*t*density).toFixed(2)+" kg";
}

function calcWelded(){
let d=w_wire.value/1000;
let s=w_space.value/1000;
let len=w_len.value;
let wid=w_wid.value;
let density=w_mat.value;
let wireLen=(len/s+wid/s);
w_result.innerHTML="Weight ≈ "+(Math.PI*d*d/4*wireLen*density).toFixed(2)+" kg";
}

function calcChain(){
let d=c_wire.value/1000;
let h=c_hole.value/1000;
let len=c_len.value;
let wid=c_wid.value;
let density=c_mat.value;
let wireLen=(len*wid)/(h*h)*1.55;
c_result.innerHTML="Weight ≈ "+(Math.PI*d*d/4*wireLen*density).toFixed(2)+" kg";
}

function calcWoven(){
let d=ww_wire.value/1000;
let pitch=(ww_hole.value/1000)+d;
let density=ww_mat.value;
let wireLen=(1/pitch)*(ww_len.value+ww_wid.value);
ww_result.innerHTML="Weight ≈ "+(Math.PI*d*d/4*wireLen*density).toFixed(2)+" kg";
}
</script>

</body>
</html>
