/* ===== DROPDOWN (NEW – ULTRA CLEAN) ===== */
.dropdown {
position:relative;
}

.dropdown > a::after {
content:"▾";
margin-left:6px;
font-size:11px;
opacity:.8;
}

.dropdown-menu {
position:absolute;
top:38px;
left:0;
background:white;
min-width:220px;
border-radius:14px;
padding:10px 0;
box-shadow:0 20px 50px rgba(0,0,0,.12);
opacity:0;
visibility:hidden;
transform:translateY(10px);
transition:.25s ease;
}

.dropdown-menu a {
display:block;
padding:10px 20px;
margin:0;
font-size:13px;
color:#111827;
}

.dropdown-menu a:hover {
background:#f1f5f9;
}

/* Hover trigger */
.dropdown:hover .dropdown-menu {
opacity:1;
visibility:visible;
transform:none;
}
